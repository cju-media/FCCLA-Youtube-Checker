<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="refresh" content="0; url=https://www.youtube.com/watch?v=8LydbPgEIW0">
    <title>Redirecting...</title>
    <script>
        // Use window.location.href to ensure JavaScript also triggers a redirect
        window.location.href = "https://www.youtube.com/watch?v=8LydbPgEIW0";
        // Attempt to close the window after a short delay (useful on mobile when app opens)
        setTimeout(function() {
            window.close();
        }, 2000);
    </script>
</head>
<body>
    <p>If you are not redirected, <a href="https://www.youtube.com/watch?v=8LydbPgEIW0">click here</a>.</p>
</body>
</html>
